cors:
  origin:
    - "*"
  allowMethods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "PATCH"
    - "OPTIONS"
  allowHeaders:
    - "Content-Type"
    - "Authorization"
    - "X-Org-Context"
    - "X-Schema-Token"
    - "X-Spa-Access-Token"
    - "X-Forwarded-For"
    - "X-Forwarded-By"

server:
  name: "Example App"
  version: "0.1.0"
  description: "Example App - Generated by Bobra Framework"

# Environment Variable Resolution
# =================================
# This config supports $VAR and ${VAR} syntax for environment variables.
# Resolution priority (in order):
# 1. Cloudflare Secrets (production via `wrangler secret put VARIABLE_NAME`)
# 2. .dev.vars file (local development via `wrangler dev`)
# 3. Hardcoded fallback values (if variable not found)
#
# Example: localConnectionString: ${POSTGRES_CONNECTION_STRING}
# This will be resolved at worker runtime from .dev.vars or secrets.

# Global database engine configuration
# Options: "postgres", "d1-sqlite", "auto-detect"
db_engine: "d1-sqlite"

# pgEdge multi-region database routing (disabled for local dev — single DB)
# pgEdge:
#   enabled: true
#   locations:
#     - eu
#     - us

# Deployment context configuration
# Options: "cloudflare" (for Cloudflare-hosted instances (still can use Postgres)), "self-hosted" (for self-hosted instances outside of Cloudflare)
deployment_context: "cloudflare"

# Global variables resolved to all workers
vars:
  APP_NAME: "Example App"

# Global logging configuration
logging:
  level: 1                  # (0=DEBUG, 1=INFO, 2=WARN, 3=ERROR, 4=SILENT)
  format: "text"            # ("json", "text")
  startupVerbosity: []      # ['worker-registry', 'discovery-validation', 'handler-add', 'handler-init']        
  logIncomingRequest: false # Log incoming request before processing
  logRequestBody: false     # Log request body
  logResponseBody: false    # Log response body
  logHeaders: false         # Log request headers
  includeTimestamp: true    
  includeContext: false     # Include worker name in log messages
  colorize: true
  debugSink: "info"

# Worker configurations
workers:
  example-app-api-docs-worker:
    name: "example-app-api-docs-worker"
    port: 8781
    inspector_port: 8221
    description: "API docs worker"
    main: "src/index.ts"
    handlers:
      - "api-docs"
    database:
      postgres:
        binding: "POSTGRES"
        id: "example-app-postgres-db"
        localConnectionString: "postgresql://example_app_user:example_app_password@localhost:5432/example_app-db"
      d1:
        binding: "D1"
        database_name: "example-app-db"
        database_id: "example-app-db"
        migrations_dir: "../../shared-utils/src/db/migrations-sqlite"
    services:
      - binding: "EXAMPLE_APP_ROUTER"
        service: "example-app-router-worker"
        external_url: "http://localhost:8700"

  example-app-dashboard-worker:
    name: "example-app-dashboard-worker"
    port: 8782
    inspector_port: 8222
    description: "Dashboard worker"
    main: "src/index.ts"
    handlers: []
    database:
      postgres:
        binding: "POSTGRES"
        id: "example-app-postgres-db"
        localConnectionString: "postgresql://example_app_user:example_app_password@localhost:5432/example_app-db"
      d1:
        binding: "D1"
        database_name: "example-app-db"
        database_id: "example-app-db"
        migrations_dir: "../../shared-utils/src/db/migrations-sqlite"
    services:
      - binding: "EXAMPLE_APP_ROUTER"
        service: "example-app-router-worker"
        external_url: "http://localhost:8700"
    assets:
      directory: "dist"
      binding: "ASSETS"
      not_found_handling: "none"
      html_handling: "none"
      run_worker_first: false

# Router configuration
router:
  name: example-app-router-worker
  port: 8700
  inspector_port: 8220
  description: Central routing worker for Example App
  main: src/index.ts
  base_path: /
  logging:
    level: 1
    format: text            
    startupVerbosity: []      
    logIncomingRequest: true  
    logRequestBody: false     
    logResponseBody: false    
    logHeaders: false
    includeTimestamp: true    
    includeContext: true
    colorize: true
    debugSink: info
  assets:
    directory: "dist"
    binding: "ASSETS"
    # Main router just serves Main App by default (SPA fallback)
    not_found_handling: "single-page-application"
    html_handling: "none"
  services: []
  routes:
    # API Routes
    - path: "/api/api-docs*"
      service: "example-app-api-docs-worker"
    
    # Frontend Routes
    - path: "/dashboard*"
      service: "example-app-dashboard-worker"
